<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0">

<title>
  {% if page.title %}
    {{ page.title }} | {{ site.title }}
  {% else %}
    {{ site.title }}
  {% endif %}
</title>

<meta name="description" content="{{ page.description | default: site.description }}">

<meta name="google-site-verification" content="8fdde2793a6cfc77">

<meta name="author" content="Daiki Tomojiri-Kadotani">
<meta name="keywords" content="aquatic ecology, coral reef ecosystems, eDNA, fish community ecology, environmental DNA, invasive species, socio-ecological systems, Kyoto, Japan">

<link rel="icon" href="{{ '/assets/img/favicon.png' | relative_url }}">

<link rel="stylesheet" href="{{ '/assets/css/base.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/css/layout.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/css/components.css' | relative_url }}">
{% if page.page_css %}
<link rel="stylesheet" href="{{ page.page_css | relative_url }}">
{% endif %}

<link href="https://use.fontawesome.com/releases/v5.6.1/css/all.css" rel="stylesheet">

<!-- ORCID / Google Scholar icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
